name: Gerar APK PortoMicro CRM

on:
  workflow_dispatch: # Permite que você clique em um botão para gerar o APK quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código fonte original do seu repositório
      - name: Baixar codigo fonte
        uses: actions/checkout@v4

      # 2. Instala o Java (necessário para compilar o Android)
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Instala o Flutter oficial
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Entra na pasta do app e baixa as dependências originais
      - name: Baixar dependencias do pubspec
        run: |
          cd flutex_admin
          flutter pub get

      # 5. Compila o APK original sem nenhuma alteração
      - name: Compilar APK
        run: |
          cd flutex_admin
          flutter build apk --release

      # 6. Salva o APK pronto para você baixar
      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: PortoMicro-CRM-APK
          path: flutex_admin/build/app/outputs/flutter-apk/app-release.apk
